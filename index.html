<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cronômetro · Rotina Lucrativa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400&family=Inter:wght@500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
--rl-text: rgba(55, 53, 47, 1);
}

@media (prefers-color-scheme: dark) {
:root {
--rl-text: rgba(255, 255, 255, 0.81);
}
}

html, body {
height: 100%;
background-color: transparent;
color: var(--rl-text);
overflow: hidden;
-webkit-font-smoothing: antialiased;
}

.rl-cron {
width: 100%;
height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: flex-start;
padding: 8px 12px 32px 12px;
gap: 14px;
}

.rl-cron-display {
font-family: 'Playfair Display', serif;
font-weight: 400;
font-size: 108px;
color: var(--rl-text);
letter-spacing: -0.03em;
line-height: 1;
font-variant-numeric: tabular-nums;
}

.rl-cron-controls {
display: flex;
gap: 8px;
align-items: center;
}

.rl-cron-btn {
font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
font-weight: 500;
font-size: 14px;
color: #2C2C2B;
background-color: #F5EDE9;
border: 1px solid #DDD5D0;
border-radius: 6px;
padding: 6px 14px;
cursor: pointer;
display: inline-flex;
align-items: center;
gap: 6px;
box-shadow: none;
transition: background-color 0.15s ease;
}

.rl-cron-btn:hover {
background-color: #EBDAD2;
}

.rl-cron-btn:active {
background-color: #EBDAD2;
}

.rl-icon {
display: inline-flex;
align-items: center;
justify-content: center;
width: 16px;
height: 16px;
flex-shrink: 0;
}

.rl-icon svg {
width: 100%;
height: 100%;
display: block;
}

@media (max-width: 600px) {
.rl-cron-display { font-size: 80px; }
}

@media (max-width: 380px) {
.rl-cron-display { font-size: 64px; }
}
</style>
</head>
<body>

<div class="rl-cron">
<div class="rl-cron-display" id="rl-cron-display">00:00:00</div>
<div class="rl-cron-controls">
<button class="rl-cron-btn" id="rl-cron-toggle" type="button">
<span class="rl-icon" id="rl-toggle-icon"></span>
<span class="rl-label" id="rl-toggle-label">Iniciar</span>
</button>
<button class="rl-cron-btn" id="rl-cron-reset" type="button">
<span class="rl-icon" id="rl-reset-icon"></span>
<span class="rl-label">Resetar</span>
</button>
</div>
</div>

<script>
(function() {

var ICON_PLAY = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><path fill="#D48D6C" fill-rule="evenodd" d="M12.293 14.293a1 1 0 0 0 1.414 1.414l2.913-2.913.044-.046a.998.998 0 0 0 0-1.496l-.044-.046-2.913-2.913a1 1 0 1 0-1.414 1.414L13.586 11H8a1 1 0 1 0 0 2h5.586zM7.25 2.388C8.55 2.099 10.124 2 12 2s3.451.1 4.75.388c1.31.291 2.399.788 3.236 1.626s1.335 1.926 1.626 3.236c.289 1.3.388 2.874.388 4.75s-.1 3.451-.388 4.75c-.291 1.31-.788 2.399-1.626 3.236s-1.926 1.335-3.236 1.626c-1.3.289-2.874.388-4.75.388s-3.451-.1-4.75-.388c-1.31-.291-2.399-.788-3.236-1.626S2.679 18.06 2.388 16.75C2.099 15.45 2 13.876 2 12s.1-3.451.388-4.75c.291-1.31.788-2.399 1.626-3.236S5.94 2.679 7.25 2.388" clip-rule="evenodd"/></svg>';

var ICON_PAUSE = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><path fill="#D48D6C" fill-rule="evenodd" d="M14 8a1 1 0 0 1 1 1v6a1 1 0 1 1-2 0V9a1 1 0 0 1 1-1m-4 0a1 1 0 0 1 1 1v6a1 1 0 1 1-2 0V9a1 1 0 0 1 1-1M7.25 2.388C8.55 2.099 10.124 2 12 2s3.451.1 4.75.388c1.31.291 2.399.788 3.236 1.626s1.335 1.926 1.626 3.236c.289 1.3.388 2.874.388 4.75s-.1 3.451-.388 4.75c-.291 1.31-.788 2.399-1.626 3.236s-1.926 1.335-3.236 1.626c-1.3.289-2.874.388-4.75.388s-3.451-.1-4.75-.388c-1.31-.291-2.399-.788-3.236-1.626S2.679 18.06 2.388 16.75C2.099 15.45 2 13.876 2 12s.1-3.451.388-4.75c.291-1.31.788-2.399 1.626-3.236S5.94 2.679 7.25 2.388" clip-rule="evenodd"/></svg>';

var ICON_RESET = '<svg xmlns="http://www.w3.org/2000/svg" fill="#D48D6C" viewBox="0 0 24 24"><path d="M22 12c0 5.523-4.477 10-10 10S2 17.523 2 12 6.477 2 12 2v2a8 8 0 1 0 5.135 1.865L15 8V2h6l-2.447 2.447A9.98 9.98 0 0 1 22 12"/></svg>';

var display = document.getElementById('rl-cron-display');
var toggle = document.getElementById('rl-cron-toggle');
var toggleIcon = document.getElementById('rl-toggle-icon');
var toggleLabel = document.getElementById('rl-toggle-label');
var reset = document.getElementById('rl-cron-reset');
var resetIcon = document.getElementById('rl-reset-icon');

toggleIcon.innerHTML = ICON_PLAY;
resetIcon.innerHTML = ICON_RESET;

var interval = null;
var elapsed = 0;
var start = 0;

function format(ms) {
var totalSec = Math.floor(ms / 1000);
var h = Math.floor(totalSec / 3600);
var m = Math.floor((totalSec % 3600) / 60);
var s = totalSec % 60;
return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function update() {
var now = Date.now();
display.textContent = format(elapsed + (now - start));
}

toggle.addEventListener('click', function() {
if (interval) {
elapsed += Date.now() - start;
clearInterval(interval);
interval = null;
toggleIcon.innerHTML = ICON_PLAY;
toggleLabel.textContent = 'Continuar';
} else {
start = Date.now();
interval = setInterval(update, 200);
toggleIcon.innerHTML = ICON_PAUSE;
toggleLabel.textContent = 'Pausar';
}
});

reset.addEventListener('click', function() {
clearInterval(interval);
interval = null;
elapsed = 0;
start = 0;
display.textContent = '00:00:00';
toggleIcon.innerHTML = ICON_PLAY;
toggleLabel.textContent = 'Iniciar';
});

})();
</script>

</body>
</html>
