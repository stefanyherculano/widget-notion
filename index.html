<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cronômetro · Rotina Lucrativa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400&family=Inter:wght@500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
height: 100%;
background-color: transparent;
color: #2C2C2B;
overflow: hidden;
-webkit-font-smoothing: antialiased;
}

.rl-cron {
width: 100%;
height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 8px 12px;
gap: 14px;
}

.rl-cron-display {
font-family: 'Playfair Display', serif;
font-weight: 400;
font-size: 108px;
color: #2C2C2B;
letter-spacing: -0.03em;
line-height: 1;
font-variant-numeric: tabular-nums;
}

.rl-cron-controls {
display: flex;
gap: 8px;
align-items: center;
}

.rl-cron-btn {
font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
font-weight: 500;
font-size: 14px;
color: #2C2C2B;
background-color: rgba(255, 255, 255, 0.9);
border: 1px solid rgba(55, 53, 47, 0.16);
border-radius: 6px;
padding: 6px 14px;
cursor: pointer;
box-shadow: rgba(15, 15, 15, 0.1) 0px 1px 2px;
transition: background-color 0.15s ease, box-shadow 0.15s ease;
}

.rl-cron-btn:hover {
background-color: rgba(248, 248, 247, 1);
box-shadow: rgba(15, 15, 15, 0.15) 0px 2px 4px;
}

.rl-cron-btn:active {
background-color: rgba(240, 240, 239, 1);
box-shadow: rgba(15, 15, 15, 0.05) 0px 1px 1px;
}

@media (max-width: 600px) {
.rl-cron-display { font-size: 80px; }
}

@media (max-width: 380px) {
.rl-cron-display { font-size: 64px; }
}
</style>
</head>
<body>

<div class="rl-cron">
<div class="rl-cron-display" id="rl-cron-display">00:00:00</div>
<div class="rl-cron-controls">
<button class="rl-cron-btn" id="rl-cron-toggle" type="button">Iniciar</button>
<button class="rl-cron-btn" id="rl-cron-reset" type="button">Resetar</button>
</div>
</div>

<script>
(function() {

var display = document.getElementById('rl-cron-display');
var toggle = document.getElementById('rl-cron-toggle');
var reset = document.getElementById('rl-cron-reset');

var interval = null;
var elapsed = 0;
var start = 0;

function format(ms) {
var totalSec = Math.floor(ms / 1000);
var h = Math.floor(totalSec / 3600);
var m = Math.floor((totalSec % 3600) / 60);
var s = totalSec % 60;
return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function update() {
var now = Date.now();
display.textContent = format(elapsed + (now - start));
}

toggle.addEventListener('click', function() {
if (interval) {
elapsed += Date.now() - start;
clearInterval(interval);
interval = null;
toggle.textContent = 'Continuar';
} else {
start = Date.now();
interval = setInterval(update, 200);
toggle.textContent = 'Pausar';
}
});

reset.addEventListener('click', function() {
clearInterval(interval);
interval = null;
elapsed = 0;
start = 0;
display.textContent = '00:00:00';
toggle.textContent = 'Iniciar';
});

})();
</script>

</body>
</html>
