<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>Pomodoro · Rotina Lucrativa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html {
color-scheme: light dark;
}

html, body {
min-height: 100%;
background-color: transparent;
overflow-x: hidden;
overflow-y: auto;
-webkit-font-smoothing: antialiased;
}

.rl-pomo {
width: 100%;
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: flex-start;
padding: 16px 12px 32px 12px;
gap: 28px;
}

.rl-pomo-display {
font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif;
font-weight: 600;
font-size: 156px;
color: rgba(55, 53, 47, 1);
letter-spacing: -0.02em;
line-height: 1;
font-variant-numeric: tabular-nums;
}

.rl-pomo-cycle-info {
font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
font-weight: 500;
font-size: 13px;
color: rgba(55, 53, 47, 0.6);
margin-top: -12px;
}

@media (prefers-color-scheme: dark) {
.rl-pomo-display { color: rgba(255, 255, 255, 0.95); }
.rl-pomo-cycle-info { color: rgba(255, 255, 255, 0.55); }
}

.rl-pomo-controls {
display: flex;
gap: 8px;
align-items: center;
width: 100%;
max-width: 720px;
}

.rl-btn {
font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
font-weight: 500;
font-size: 14px;
color: #2C2C2B;
background-color: #F5EDE9;
border: 1px solid #DDD5D0;
border-radius: 6px;
padding: 10px 20px;
cursor: pointer;
display: inline-flex;
align-items: center;
justify-content: center;
gap: 10px;
box-shadow: none;
transition: background-color 0.15s ease;
appearance: none;
-webkit-appearance: none;
flex: 1;
min-width: 0;
}

.rl-btn:hover,
.rl-btn:active,
.rl-btn:focus {
background-color: #EBDAD2;
color: #2C2C2B;
outline: none;
}

.rl-label {
color: #2C2C2B;
white-space: nowrap;
}

@media (prefers-color-scheme: dark) {
.rl-btn {
background-color: #45362D;
border-color: #584A40;
color: rgba(255, 255, 255, 0.95);
}
.rl-btn:hover,
.rl-btn:active,
.rl-btn:focus {
background-color: #724D3C;
color: rgba(255, 255, 255, 0.95);
}
.rl-label { color: rgba(255, 255, 255, 0.95); }
}

.rl-icon {
display: inline-flex;
align-items: center;
justify-content: center;
width: 20px;
height: 20px;
flex-shrink: 0;
}

.rl-icon svg {
width: 100%;
height: 100%;
display: block;
}

.rl-cards {
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 8px;
width: 100%;
max-width: 720px;
}

.rl-card {
background-color: #F5EDE9;
border: 1px solid #DDD5D0;
border-radius: 8px;
padding: 16px;
display: grid;
grid-template-rows: 1fr 1fr 1fr;
align-items: center;
justify-items: center;
min-height: 130px;
min-width: 0;
}

.rl-card--end {
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
gap: 8px;
}

@media (prefers-color-scheme: dark) {
.rl-card {
background-color: #45362D;
border-color: #584A40;
}
}

.rl-card-value {
font-family: 'Lato', -apple-system, BlinkMacSystemFont, sans-serif;
font-weight: 700;
font-size: 29px;
color: #D48D6C;
letter-spacing: -0.01em;
line-height: 1;
display: flex;
align-items: baseline;
gap: 4px;
}

.rl-card-value-unit {
font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
font-weight: 500;
font-size: 11px;
color: rgba(55, 53, 47, 0.55);
text-transform: lowercase;
letter-spacing: 0.5px;
}

@media (prefers-color-scheme: dark) {
.rl-card-value-unit { color: rgba(255, 255, 255, 0.5); }
}

.rl-card-label {
font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
font-weight: 600;
font-size: 10px;
letter-spacing: 1.5px;
text-transform: uppercase;
color: rgba(55, 53, 47, 0.6);
text-align: center;
}

@media (prefers-color-scheme: dark) {
.rl-card-label { color: rgba(255, 255, 255, 0.6); }
}

.rl-card-control {
width: 100%;
display: flex;
align-items: center;
justify-content: center;
}

.rl-slider {
appearance: none;
-webkit-appearance: none;
width: 100%;
height: 4px;
background: rgba(212, 141, 108, 0.25);
border-radius: 2px;
outline: none;
cursor: pointer;
}

.rl-slider::-webkit-slider-thumb {
appearance: none;
-webkit-appearance: none;
width: 14px;
height: 14px;
background: #D48D6C;
border-radius: 50%;
cursor: pointer;
border: none;
}

.rl-slider::-moz-range-thumb {
width: 14px;
height: 14px;
background: #D48D6C;
border-radius: 50%;
cursor: pointer;
border: none;
}

.rl-stepper {
display: flex;
gap: 8px;
}

.rl-step-btn {
width: 32px;
height: 32px;
display: inline-flex;
align-items: center;
justify-content: center;
background-color: rgba(212, 141, 108, 0.15);
border: 1px solid rgba(212, 141, 108, 0.3);
border-radius: 8px;
cursor: pointer;
padding: 0;
transition: background-color 0.15s ease;
appearance: none;
-webkit-appearance: none;
}

.rl-step-btn:hover {
background-color: rgba(212, 141, 108, 0.3);
}

.rl-step-btn svg {
width: 27px;
height: 27px;
display: block;
}

@media (max-width: 720px) {
.rl-pomo { gap: 22px; }
.rl-pomo-display { font-size: 112px; }
.rl-pomo-cycle-info { margin-top: -8px; }
.rl-cards { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 480px) {
.rl-pomo { padding: 12px 10px 28px 10px; gap: 18px; }
.rl-pomo-display { font-size: 74px; }
.rl-pomo-cycle-info { margin-top: -6px; }
.rl-card-value { font-size: 25px; }
.rl-card-value-unit { font-size: 10px; }
.rl-card { padding: 12px 10px; min-height: 110px; }
.rl-pomo-controls { gap: 6px; }
.rl-btn { padding: 9px 14px; font-size: 13px; gap: 8px; }
.rl-icon { width: 18px; height: 18px; }
.rl-cards { gap: 6px; }
.rl-step-btn { width: 30px; height: 30px; border-radius: 7px; }
.rl-step-btn svg { width: 25px; height: 25px; }
}

@media (max-width: 360px) {
.rl-pomo-display { font-size: 54px; }
.rl-card-value { font-size: 22px; }
.rl-btn { padding: 7px 10px; font-size: 12.5px; gap: 6px; }
.rl-icon { width: 16px; height: 16px; }
.rl-card { padding: 10px 8px; min-height: 100px; }
.rl-step-btn { width: 28px; height: 28px; border-radius: 6px; }
.rl-step-btn svg { width: 23px; height: 23px; }
}
</style>
</head>
<body>

<div class="rl-pomo">
<div class="rl-pomo-display" id="rl-pomo-display">25:00</div>
<div class="rl-pomo-cycle-info" id="rl-pomo-cycle-info">Ciclo 1 de 4</div>

<div class="rl-pomo-controls">
<button class="rl-btn" id="rl-pomo-toggle" type="button">
<span class="rl-icon" id="rl-toggle-icon"></span>
<span class="rl-label" id="rl-toggle-label">Iniciar</span>
</button>
<button class="rl-btn" id="rl-pomo-skip" type="button">
<span class="rl-icon" id="rl-skip-icon"></span>
<span class="rl-label">Pular</span>
</button>
<button class="rl-btn" id="rl-pomo-reset" type="button">
<span class="rl-icon" id="rl-reset-icon"></span>
<span class="rl-label">Resetar</span>
</button>
</div>

<div class="rl-cards">

<div class="rl-card">
<div class="rl-card-value"><span id="rl-val-focus">25</span><span class="rl-card-value-unit">min</span></div>
<div class="rl-card-label">Foco</div>
<div class="rl-card-control">
<input type="range" class="rl-slider" id="rl-slider-focus" min="1" max="60" value="25">
</div>
</div>

<div class="rl-card">
<div class="rl-card-value"><span id="rl-val-break">5</span><span class="rl-card-value-unit">min</span></div>
<div class="rl-card-label">Pausa</div>
<div class="rl-card-control">
<input type="range" class="rl-slider" id="rl-slider-break" min="1" max="30" value="5">
</div>
</div>

<div class="rl-card">
<div class="rl-card-value"><span id="rl-val-cycles">4</span></div>
<div class="rl-card-label">Ciclos</div>
<div class="rl-card-control">
<div class="rl-stepper">
<button class="rl-step-btn" id="rl-cycles-down" type="button" aria-label="Diminuir ciclos">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#D48D6C"><path d="M7 10l5 5 5-5z"/></svg>
</button>
<button class="rl-step-btn" id="rl-cycles-up" type="button" aria-label="Aumentar ciclos">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#D48D6C"><path d="M7 14l5-5 5 5z"/></svg>
</button>
</div>
</div>
</div>

<div class="rl-card rl-card--end">
<div class="rl-card-value" id="rl-val-end">--:--</div>
<div class="rl-card-label">Termina às</div>
</div>

</div>
</div>

<script>
(function() {

var ICON_PLAY = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><path fill="#D48D6C" fill-rule="evenodd" d="M12.293 14.293a1 1 0 0 0 1.414 1.414l2.913-2.913.044-.046a.998.998 0 0 0 0-1.496l-.044-.046-2.913-2.913a1 1 0 1 0-1.414 1.414L13.586 11H8a1 1 0 1 0 0 2h5.586zM7.25 2.388C8.55 2.099 10.124 2 12 2s3.451.1 4.75.388c1.31.291 2.399.788 3.236 1.626s1.335 1.926 1.626 3.236c.289 1.3.388 2.874.388 4.75s-.1 3.451-.388 4.75c-.291 1.31-.788 2.399-1.626 3.236s-1.926 1.335-3.236 1.626c-1.3.289-2.874.388-4.75.388s-3.451-.1-4.75-.388c-1.31-.291-2.399-.788-3.236-1.626S2.679 18.06 2.388 16.75C2.099 15.45 2 13.876 2 12s.1-3.451.388-4.75c.291-1.31.788-2.399 1.626-3.236S5.94 2.679 7.25 2.388" clip-rule="evenodd"/></svg>';

var ICON_PAUSE = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><path fill="#D48D6C" fill-rule="evenodd" d="M14 8a1 1 0 0 1 1 1v6a1 1 0 1 1-2 0V9a1 1 0 0 1 1-1m-4 0a1 1 0 0 1 1 1v6a1 1 0 1 1-2 0V9a1 1 0 0 1 1-1M7.25 2.388C8.55 2.099 10.124 2 12 2s3.451.1 4.75.388c1.31.291 2.399.788 3.236 1.626s1.335 1.926 1.626 3.236c.289 1.3.388 2.874.388 4.75s-.1 3.451-.388 4.75c-.291 1.31-.788 2.399-1.626 3.236s-1.926 1.335-3.236 1.626c-1.3.289-2.874.388-4.75.388s-3.451-.1-4.75-.388c-1.31-.291-2.399-.788-3.236-1.626S2.679 18.06 2.388 16.75C2.099 15.45 2 13.876 2 12s.1-3.451.388-4.75c.291-1.31.788-2.399 1.626-3.236S5.94 2.679 7.25 2.388" clip-rule="evenodd"/></svg>';

var ICON_RESET = '<svg xmlns="http://www.w3.org/2000/svg" fill="#D48D6C" viewBox="0 0 24 24"><path d="M22 12c0 5.523-4.477 10-10 10S2 17.523 2 12 6.477 2 12 2v2a8 8 0 1 0 5.135 1.865L15 8V2h6l-2.447 2.447A9.98 9.98 0 0 1 22 12"/></svg>';

var ICON_SKIP = '<svg xmlns="http://www.w3.org/2000/svg" fill="#D48D6C" viewBox="0 0 16 16"><path d="M12.5 4a.5.5 0 0 0-1 0v3.248L5.233 3.612C4.693 3.3 4 3.678 4 4.308v7.384c0 .63.692 1.01 1.233.697L11.5 8.753V12a.5.5 0 0 0 1 0z"/></svg>';

var display = document.getElementById('rl-pomo-display');
var cycleInfo = document.getElementById('rl-pomo-cycle-info');
var toggle = document.getElementById('rl-pomo-toggle');
var toggleIcon = document.getElementById('rl-toggle-icon');
var toggleLabel = document.getElementById('rl-toggle-label');
var skip = document.getElementById('rl-pomo-skip');
var skipIcon = document.getElementById('rl-skip-icon');
var reset = document.getElementById('rl-pomo-reset');
var resetIcon = document.getElementById('rl-reset-icon');

var sliderFocus = document.getElementById('rl-slider-focus');
var sliderBreak = document.getElementById('rl-slider-break');
var valFocus = document.getElementById('rl-val-focus');
var valBreak = document.getElementById('rl-val-break');
var valCycles = document.getElementById('rl-val-cycles');
var valEnd = document.getElementById('rl-val-end');
var cyclesUp = document.getElementById('rl-cycles-up');
var cyclesDown = document.getElementById('rl-cycles-down');

toggleIcon.innerHTML = ICON_PLAY;
skipIcon.innerHTML = ICON_SKIP;
resetIcon.innerHTML = ICON_RESET;

var focusMin = 25;
var breakMin = 5;
var totalCycles = 4;

var interval = null;
var endTime = 0;
var remaining = 0;
var phaseIndex = 0;
var cycle = 1;
var running = false;

function phaseDuration() {
return (phaseIndex === 0 ? focusMin : breakMin) * 60 * 1000;
}

function format(ms) {
if (ms < 0) ms = 0;
var totalSec = Math.ceil(ms / 1000);
var m = Math.floor(totalSec / 60);
var s = totalSec % 60;
return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function formatClock(date) {
return String(date.getHours()).padStart(2, '0') + ':' + String(date.getMinutes()).padStart(2, '0');
}

function calcRemainingTotalMs() {
var ms = 0;
if (running) {
ms += Math.max(0, endTime - Date.now());
} else {
ms += remaining > 0 ? remaining : phaseDuration();
}
var futurePhase = phaseIndex;
var futureCycle = cycle;
while (true) {
if (futurePhase === 0) {
futurePhase = 1;
ms += breakMin * 60 * 1000;
} else {
if (futureCycle >= totalCycles) break;
futureCycle++;
futurePhase = 0;
ms += focusMin * 60 * 1000;
}
if (futurePhase === 1 && futureCycle === totalCycles) {
break;
}
}
return ms;
}

function updateEndTime() {
var totalMs = calcRemainingTotalMs();
var end = new Date(Date.now() + totalMs);
valEnd.textContent = formatClock(end);
}

function render(showRemaining) {
cycleInfo.textContent = 'Ciclo ' + cycle + ' de ' + totalCycles;
display.textContent = format(showRemaining);
updateEndTime();
}

function advance() {
if (phaseIndex === 0) {
phaseIndex = 1;
} else {
phaseIndex = 0;
if (cycle < totalCycles) cycle++;
else cycle = 1;
}
remaining = phaseDuration();
try {
var ctx = new (window.AudioContext || window.webkitAudioContext)();
var osc = ctx.createOscillator();
var gain = ctx.createGain();
osc.connect(gain);
gain.connect(ctx.destination);
osc.frequency.value = 660;
gain.gain.setValueAtTime(0.0001, ctx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.15, ctx.currentTime + 0.02);
gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.4);
osc.start(ctx.currentTime);
osc.stop(ctx.currentTime + 0.42);
} catch (e) {}
}

function tick() {
var ms = endTime - Date.now();
if (ms <= 0) {
advance();
endTime = Date.now() + remaining;
render(remaining);
} else {
render(ms);
}
}

toggle.addEventListener('click', function() {
if (running) {
remaining = endTime - Date.now();
clearInterval(interval);
interval = null;
running = false;
toggleIcon.innerHTML = ICON_PLAY;
toggleLabel.textContent = 'Continuar';
render(remaining);
} else {
if (remaining <= 0) remaining = phaseDuration();
endTime = Date.now() + remaining;
interval = setInterval(tick, 250);
running = true;
toggleIcon.innerHTML = ICON_PAUSE;
toggleLabel.textContent = 'Pausar';
render(remaining);
}
});

skip.addEventListener('click', function() {
advance();
if (running) {
endTime = Date.now() + remaining;
render(remaining);
} else {
render(remaining);
}
});

reset.addEventListener('click', function() {
clearInterval(interval);
interval = null;
running = false;
phaseIndex = 0;
cycle = 1;
remaining = phaseDuration();
toggleIcon.innerHTML = ICON_PLAY;
toggleLabel.textContent = 'Iniciar';
render(remaining);
});

sliderFocus.addEventListener('input', function() {
focusMin = parseInt(sliderFocus.value, 10);
valFocus.textContent = focusMin;
if (!running) {
if (phaseIndex === 0) remaining = phaseDuration();
render(remaining > 0 ? remaining : phaseDuration());
} else {
updateEndTime();
}
});

sliderBreak.addEventListener('input', function() {
breakMin = parseInt(sliderBreak.value, 10);
valBreak.textContent = breakMin;
if (!running) {
if (phaseIndex === 1) remaining = phaseDuration();
render(remaining > 0 ? remaining : phaseDuration());
} else {
updateEndTime();
}
});

cyclesUp.addEventListener('click', function() {
if (totalCycles < 10) {
totalCycles++;
valCycles.textContent = totalCycles;
render(running ? endTime - Date.now() : (remaining > 0 ? remaining : phaseDuration()));
}
});

cyclesDown.addEventListener('click', function() {
if (totalCycles > 2) {
totalCycles--;
if (cycle > totalCycles) cycle = totalCycles;
valCycles.textContent = totalCycles;
render(running ? endTime - Date.now() : (remaining > 0 ? remaining : phaseDuration()));
}
});

remaining = phaseDuration();
render(remaining);

})();
</script>

</body>
</html>
