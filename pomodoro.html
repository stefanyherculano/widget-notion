<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>Pomodoro · Rotina Lucrativa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html {
color-scheme: light dark;
}

html, body {
background-color: transparent;
overflow-x: hidden;
overflow-y: auto;
-webkit-font-smoothing: antialiased;
height: fit-content;
}

.rl-pomo {
width: 100%;
display: flex;
flex-direction: column;
align-items: center;
justify-content: flex-start;
padding: 5px 6px;
gap: 14px;
}

.rl-pomo-display {
font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif;
font-weight: 700;
font-size: 30px;
color: rgba(55, 53, 47, 1);
letter-spacing: -0.02em;
line-height: 1.2;
font-variant-numeric: tabular-nums;
}

.rl-pomo-cycle-info {
font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
font-weight: 500;
font-size: 13px;
color: rgba(55, 53, 47, 0.6);
margin-top: -4px;
}

@media (prefers-color-scheme: dark) {
.rl-pomo-display { color: rgba(255, 255, 255, 0.95); }
.rl-pomo-cycle-info { color: rgba(255, 255, 255, 0.55); }
}

.rl-pomo-controls {
display: flex;
gap: 8px;
align-items: center;
justify-content: center;
width: 100%;
}

.rl-btn {
font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
font-weight: 500;
font-size: 14px;
line-height: 1.2;
color: #2C2C2B;
background-color: #F5EDE9;
border: 1px solid #DDD5D0;
border-radius: 6px;
padding: 7px 16px;
cursor: pointer;
display: inline-flex;
align-items: center;
justify-content: center;
gap: 8px;
box-shadow: none;
transition: background-color 0.15s ease;
appearance: none;
-webkit-appearance: none;
width: 100%;
height: 36px;
}

.rl-btn[hidden] {
display: none;
}

.rl-btn:hover,
.rl-btn:active,
.rl-btn:focus {
background-color: #EBDAD2;
color: #2C2C2B;
outline: none;
}

.rl-label {
color: #2C2C2B;
white-space: nowrap;
}

@media (prefers-color-scheme: dark) {
.rl-btn {
background-color: #45362D;
border-color: #584A40;
color: rgba(255, 255, 255, 0.95);
}
.rl-btn:hover,
.rl-btn:active,
.rl-btn:focus {
background-color: #724D3C;
color: rgba(255, 255, 255, 0.95);
}
.rl-label { color: rgba(255, 255, 255, 0.95); }
}

.rl-icon {
display: inline-flex;
align-items: center;
justify-content: center;
width: 18px;
height: 18px;
flex-shrink: 0;
}

.rl-icon svg {
width: 100%;
height: 100%;
display: block;
}

.rl-cards {
display: grid;
grid-template-columns: repeat(2, 1fr);
gap: 8px;
width: 100%;
}

.rl-card {
background-color: #F5EDE9;
border: 1px solid #DDD5D0;
border-radius: 8px;
padding: 14px 12px;
display: grid;
grid-template-rows: 1fr 1fr 1fr;
align-items: center;
justify-items: center;
min-height: 120px;
min-width: 0;
}

.rl-card--end {
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
gap: 8px;
}

.rl-pomo--running .rl-card {
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
gap: 8px;
}

.rl-pomo--running .rl-card-control {
display: none;
}

@media (prefers-color-scheme: dark) {
.rl-card {
background-color: #45362D;
border-color: #584A40;
}
}

.rl-card-value {
font-family: 'Lato', -apple-system, BlinkMacSystemFont, sans-serif;
font-weight: 700;
font-size: 26px;
color: #D48D6C;
letter-spacing: -0.01em;
line-height: 1;
display: flex;
align-items: baseline;
gap: 4px;
}

.rl-card-value-unit {
font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
font-weight: 500;
font-size: 11px;
color: rgba(55, 53, 47, 0.55);
text-transform: lowercase;
letter-spacing: 0.5px;
}

@media (prefers-color-scheme: dark) {
.rl-card-value-unit { color: rgba(255, 255, 255, 0.5); }
}

.rl-card-label {
font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
font-weight: 600;
font-size: 10px;
letter-spacing: 1.5px;
text-transform: uppercase;
color: rgba(55, 53, 47, 0.6);
text-align: center;
}

@media (prefers-color-scheme: dark) {
.rl-card-label { color: rgba(255, 255, 255, 0.6); }
}

.rl-card-control {
width: 100%;
display: flex;
align-items: center;
justify-content: center;
}

.rl-slider {
appearance: none;
-webkit-appearance: none;
width: 100%;
height: 4px;
background: rgba(212, 141, 108, 0.25);
border-radius: 2px;
outline: none;
cursor: pointer;
}

.rl-slider::-webkit-slider-thumb {
appearance: none;
-webkit-appearance: none;
width: 14px;
height: 14px;
background: #D48D6C;
border-radius: 50%;
cursor: pointer;
border: none;
}

.rl-slider::-moz-range-thumb {
width: 14px;
height: 14px;
background: #D48D6C;
border-radius: 50%;
cursor: pointer;
border: none;
}

.rl-stepper {
display: flex;
gap: 8px;
}

.rl-step-btn {
width: 30px;
height: 30px;
display: inline-flex;
align-items: center;
justify-content: center;
background-color: rgba(212, 141, 108, 0.15);
border: 1px solid rgba(212, 141, 108, 0.3);
border-radius: 7px;
cursor: pointer;
padding: 0;
transition: background-color 0.15s ease;
appearance: none;
-webkit-appearance: none;
}

.rl-step-btn:hover {
background-color: rgba(212, 141, 108, 0.3);
}

.rl-step-btn svg {
width: 24px;
height: 24px;
display: block;
}
</style>
</head>
<body>

<div class="rl-pomo" id="rl-pomo">
<div class="rl-pomo-display" id="rl-pomo-display">25:00</div>
<div class="rl-pomo-cycle-info" id="rl-pomo-cycle-info">Ciclo 1/4</div>

<div class="rl-pomo-controls">
<button class="rl-btn" id="rl-pomo-start" type="button">
<span class="rl-icon" id="rl-start-icon"></span>
<span class="rl-label">Iniciar sessão de foco</span>
</button>
<button class="rl-btn" id="rl-pomo-exit" type="button" hidden>
<span class="rl-icon" id="rl-exit-icon"></span>
<span class="rl-label">Sair da sessão de foco</span>
</button>
</div>

<div class="rl-cards">

<div class="rl-card">
<div class="rl-card-value"><span id="rl-val-focus">25</span><span class="rl-card-value-unit">min</span></div>
<div class="rl-card-label">Foco</div>
<div class="rl-card-control">
<input type="range" class="rl-slider" id="rl-slider-focus" min="1" max="60" value="25">
</div>
</div>

<div class="rl-card">
<div class="rl-card-value"><span id="rl-val-break">5</span><span class="rl-card-value-unit">min</span></div>
<div class="rl-card-label">Pausa</div>
<div class="rl-card-control">
<input type="range" class="rl-slider" id="rl-slider-break" min="1" max="30" value="5">
</div>
</div>

<div class="rl-card">
<div class="rl-card-value"><span id="rl-val-cycles">4</span></div>
<div class="rl-card-label">Ciclos</div>
<div class="rl-card-control">
<div class="rl-stepper">
<button class="rl-step-btn" id="rl-cycles-down" type="button" aria-label="Diminuir ciclos">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#D48D6C"><path d="M7 10l5 5 5-5z"/></svg>
</button>
<button class="rl-step-btn" id="rl-cycles-up" type="button" aria-label="Aumentar ciclos">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#D48D6C"><path d="M7 14l5-5 5 5z"/></svg>
</button>
</div>
</div>
</div>

<div class="rl-card rl-card--end">
<div class="rl-card-value" id="rl-val-end">--:--</div>
<div class="rl-card-label">Termina às</div>
</div>

</div>
</div>

<script>
(function() {

var ICON_PLAY = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><path fill="#D48D6C" fill-rule="evenodd" d="M12.293 14.293a1 1 0 0 0 1.414 1.414l2.913-2.913.044-.046a.998.998 0 0 0 0-1.496l-.044-.046-2.913-2.913a1 1 0 1 0-1.414 1.414L13.586 11H8a1 1 0 1 0 0 2h5.586zM7.25 2.388C8.55 2.099 10.124 2 12 2s3.451.1 4.75.388c1.31.291 2.399.788 3.236 1.626s1.335 1.926 1.626 3.236c.289 1.3.388 2.874.388 4.75s-.1 3.451-.388 4.75c-.291 1.31-.788 2.399-1.626 3.236s-1.926 1.335-3.236 1.626c-1.3.289-2.874.388-4.75.388s-3.451-.1-4.75-.388c-1.31-.291-2.399-.788-3.236-1.626S2.679 18.06 2.388 16.75C2.099 15.45 2 13.876 2 12s.1-3.451.388-4.75c.291-1.31.788-2.399 1.626-3.236S5.94 2.679 7.25 2.388" clip-rule="evenodd"/></svg>';

var ICON_EXIT = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path fill="#D48D6C" d="M5 5v14a1 1 0 0 0 1 1h3v-2H7V6h2V4H6a1 1 0 0 0-1 1m14.242-.97-8-2A1 1 0 0 0 10 3v18a.998.998 0 0 0 1.242.97l8-2A1 1 0 0 0 20 19V5a1 1 0 0 0-.758-.97M15 12.188a1.001 1.001 0 0 1-2 0v-.377a1 1 0 1 1 2 .001z"/></svg>';

var root = document.getElementById('rl-pomo');
var display = document.getElementById('rl-pomo-display');
var cycleInfo = document.getElementById('rl-pomo-cycle-info');
var startBtn = document.getElementById('rl-pomo-start');
var startIcon = document.getElementById('rl-start-icon');
var exitBtn = document.getElementById('rl-pomo-exit');
var exitIcon = document.getElementById('rl-exit-icon');

var sliderFocus = document.getElementById('rl-slider-focus');
var sliderBreak = document.getElementById('rl-slider-break');
var valFocus = document.getElementById('rl-val-focus');
var valBreak = document.getElementById('rl-val-break');
var valCycles = document.getElementById('rl-val-cycles');
var valEnd = document.getElementById('rl-val-end');
var cyclesUp = document.getElementById('rl-cycles-up');
var cyclesDown = document.getElementById('rl-cycles-down');

startIcon.innerHTML = ICON_PLAY;
exitIcon.innerHTML = ICON_EXIT;

var focusMin = 25;
var breakMin = 5;
var totalCycles = 4;

var interval = null;
var endTime = 0;
var remaining = 0;
var phaseIndex = 0;
var cycle = 1;
var running = false;

function phaseDuration() {
return (phaseIndex === 0 ? focusMin : breakMin) * 60 * 1000;
}

function format(ms) {
if (ms < 0) ms = 0;
var totalSec = Math.ceil(ms / 1000);
var m = Math.floor(totalSec / 60);
var s = totalSec % 60;
return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function formatClock(date) {
return String(date.getHours()).padStart(2, '0') + ':' + String(date.getMinutes()).padStart(2, '0');
}

function calcRemainingTotalMs() {
var ms = 0;
if (running) {
ms += Math.max(0, endTime - Date.now());
} else {
ms += remaining > 0 ? remaining : phaseDuration();
}
var futurePhase = phaseIndex;
var futureCycle = cycle;
while (true) {
if (futurePhase === 0) {
futurePhase = 1;
ms += breakMin * 60 * 1000;
} else {
if (futureCycle >= totalCycles) break;
futureCycle++;
futurePhase = 0;
ms += focusMin * 60 * 1000;
}
if (futurePhase === 1 && futureCycle === totalCycles) {
break;
}
}
return ms;
}

function updateEndTime() {
var totalMs = calcRemainingTotalMs();
var end = new Date(Date.now() + totalMs);
valEnd.textContent = formatClock(end);
}

function render(showRemaining) {
cycleInfo.textContent = 'Ciclo ' + cycle + '/' + totalCycles;
display.textContent = format(showRemaining);
updateEndTime();
}

function advance() {
if (phaseIndex === 0) {
phaseIndex = 1;
} else {
phaseIndex = 0;
if (cycle < totalCycles) cycle++;
else cycle = 1;
}
remaining = phaseDuration();
try {
var ctx = new (window.AudioContext || window.webkitAudioContext)();
var osc = ctx.createOscillator();
var gain = ctx.createGain();
osc.connect(gain);
gain.connect(ctx.destination);
osc.frequency.value = 660;
gain.gain.setValueAtTime(0.0001, ctx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.15, ctx.currentTime + 0.02);
gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.4);
osc.start(ctx.currentTime);
osc.stop(ctx.currentTime + 0.42);
} catch (e) {}
}

function tick() {
var ms = endTime - Date.now();
if (ms <= 0) {
advance();
endTime = Date.now() + remaining;
render(remaining);
} else {
render(ms);
}
}

function startSession() {
remaining = phaseDuration();
endTime = Date.now() + remaining;
interval = setInterval(tick, 250);
running = true;
startBtn.hidden = true;
exitBtn.hidden = false;
root.classList.add('rl-pomo--running');
render(remaining);
}

function exitSession() {
clearInterval(interval);
interval = null;
running = false;
phaseIndex = 0;
cycle = 1;
remaining = phaseDuration();
startBtn.hidden = false;
exitBtn.hidden = true;
root.classList.remove('rl-pomo--running');
render(remaining);
}

startBtn.addEventListener('click', startSession);
exitBtn.addEventListener('click', exitSession);

sliderFocus.addEventListener('input', function() {
focusMin = parseInt(sliderFocus.value, 10);
valFocus.textContent = focusMin;
if (!running) {
remaining = phaseDuration();
render(remaining);
} else {
updateEndTime();
}
});

sliderBreak.addEventListener('input', function() {
breakMin = parseInt(sliderBreak.value, 10);
valBreak.textContent = breakMin;
if (!running) {
render(remaining > 0 ? remaining : phaseDuration());
} else {
updateEndTime();
}
});

cyclesUp.addEventListener('click', function() {
if (totalCycles < 10) {
totalCycles++;
valCycles.textContent = totalCycles;
render(running ? endTime - Date.now() : (remaining > 0 ? remaining : phaseDuration()));
}
});

cyclesDown.addEventListener('click', function() {
if (totalCycles > 2) {
totalCycles--;
if (cycle > totalCycles) cycle = totalCycles;
valCycles.textContent = totalCycles;
render(running ? endTime - Date.now() : (remaining > 0 ? remaining : phaseDuration()));
}
});

remaining = phaseDuration();
render(remaining);

})();
</script>

</body>
</html>
